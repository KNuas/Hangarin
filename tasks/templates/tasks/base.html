<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangarin</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#eef2ff 0%,#f8fbff 100%);
color:#1f2937;
}

/* LAYOUT */

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:linear-gradient(180deg,#1e3a8a,#2563eb,#3b82f6);
color:white;
padding:30px 20px;
position:fixed;
left:0;
top:0;
height:100vh;
box-shadow:8px 0 30px rgba(37,99,235,.18);
}

.brand{
font-size:30px;
font-weight:800;
margin-bottom:28px;
display:block;
color:white;
text-decoration:none;
}

.sidebar nav{
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar nav a{
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-weight:600;
transition:all .25s ease;
}

.sidebar nav a:hover{
background:rgba(255,255,255,0.16);
transform:translateX(4px);
}

/* MAIN CONTENT */

.main-content{
margin-left:240px;
padding:36px;
width:100%;
}

/* WIDER CONTAINER */

.container{
width:95%;
max-width:1800px;
margin:auto;
}

/* TITLES */

.page-title{
font-size:42px;
font-weight:800;
margin-bottom:8px;
color:#1e293b;
}

.page-subtitle{
color:#64748b;
margin-bottom:26px;
font-size:16px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.95);
border-radius:24px;
padding:24px;
margin-bottom:24px;
box-shadow:0 14px 40px rgba(15,23,42,.08);
border:1px solid rgba(226,232,240,.9);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

table th{
background:#eef2ff;
color:#1e3a8a;
text-align:left;
font-weight:700;
padding:14px 16px;
font-size:14px;
}

table td{
padding:16px;
border-bottom:1px solid #e5e7eb;
}

table tr:hover{
background:#f8fafc;
}

/* BADGES */

.badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
font-size:13px;
font-weight:700;
}

.badge-pending{
background:#fef3c7;
color:#b45309;
}

.badge-progress{
background:#dbeafe;
color:#1d4ed8;
}

.badge-completed{
background:#dcfce7;
color:#166534;
}

/* BUTTONS */

.btn{
display:inline-block;
padding:10px 16px;
border-radius:12px;
text-decoration:none;
color:white;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
font-weight:700;
font-size:14px;
margin-right:8px;
margin-bottom:6px;
transition:all 0.25s ease;
box-shadow:0 8px 18px rgba(37,99,235,.16);
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 22px rgba(0,0,0,0.14);
background:linear-gradient(135deg,#1d4ed8,#1e40af);
}

/* EDIT BUTTON */

.btn-secondary{
background:linear-gradient(135deg,#64748b,#475569);
}

.btn-secondary:hover{
background:linear-gradient(135deg,#475569,#334155);
}

/* COMPLETE BUTTON */

.btn-success{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.btn-success:hover{
background:linear-gradient(135deg,#15803d,#16a34a);
}

/* DELETE BUTTON */

.btn-danger{
background:linear-gradient(135deg,#ef4444,#dc2626);
}

.btn-danger:hover{
background:linear-gradient(135deg,#dc2626,#b91c1c);
}

/* SMALL BUTTON */

.btn-sm{
padding:9px 14px;
font-size:14px;
}

/* ACTION BUTTON GROUP */

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

.actions .btn{
margin:0;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:24px;
}

.stat-box{
color:white;
padding:24px;
border-radius:18px;
text-align:center;
box-shadow:0 12px 24px rgba(15,23,42,.08);
}

.stat-box h2{
font-size:34px;
margin-bottom:6px;
}

.stat-total{
background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.stat-pending{
background:linear-gradient(135deg,#f59e0b,#f97316);
}

.stat-progress{
background:linear-gradient(135deg,#6366f1,#4f46e5);
}

.stat-completed{
background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* FORM INPUTS */

input,textarea,select{
width:100%;
padding:10px 12px;
border-radius:10px;
border:1px solid #cbd5e1;
background:white;
font-size:14px;
}

.empty-text{
color:#6b7280;
font-style:italic;
}

/* RESPONSIVE */

@media (max-width:900px){

.sidebar{
width:210px;
}

.main-content{
margin-left:210px;
padding:22px;
}

.stats{
grid-template-columns:repeat(2,1fr);
}

}

@media (max-width:768px){

.layout{
flex-direction:column;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main-content{
margin-left:0;
width:100%;
padding:18px;
}

.stats{
grid-template-columns:1fr;
}

.page-title{
font-size:32px;
}

}

</style>
</head>

<body>

<div class="layout">

<aside class="sidebar">

<a href="{% url 'dashboard' %}" class="brand">Hangarin</a>

<nav>
<a href="{% url 'dashboard' %}">Dashboard</a>
<a href="{% url 'task_list' %}">Tasks</a>
<a href="{% url 'task_create' %}">Add Task</a>
<a href="/admin/">Admin</a>
</nav>

</aside>

<main class="main-content">

<div class="container">

{% block content %}
{% endblock %}

</div>

</main>

</div>

</body>
</html>
