{% extends 'tasks/base.html' %}

{% block content %}

<h1 class="page-title">{{ title }}</h1>
<p class="page-subtitle">Create or update a task.</p>

<div class="card form-card">

<form method="POST">
{% csrf_token %}

<div class="form-grid">

<div class="form-group">
<label>Title</label>
{{ form.title }}
</div>

<div class="form-group">
<label>Status</label>
{{ form.status }}
</div>

<div class="form-group">
<label>Priority</label>
{{ form.priority }}
</div>

<div class="form-group">
<label>Category</label>
{{ form.category }}
</div>

<div class="form-group">
<label>Deadline</label>
{{ form.deadline }}
</div>

<div class="form-group">
<label>Description</label>
{{ form.description }}
</div>

</div>

<div class="form-actions">

<button type="submit" class="btn btn-success btn-form">
Save Task
</button>

<a class="btn btn-secondary btn-form" href="{% url 'task_list' %}">
Cancel
</a>

</div>

</form>

</div>

<style>

/* FORM CARD */

.form-card{
max-width:800px;
margin-top:10px;
}

/* GRID LAYOUT */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:15px;
}

/* FORM GROUP */

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
font-weight:600;
margin-bottom:6px;
color:#374151;
}

/* INPUT FIELDS */

.form-group input,
.form-group select,
.form-group textarea{
padding:10px 12px;
border-radius:10px;
border:1px solid #cbd5e1;
background:white;
font-size:14px;
}

/* DESCRIPTION FULL WIDTH */

.form-group textarea{
grid-column:span 2;
min-height:90px;
}

/* ACTION BUTTONS */

.form-actions{
margin-top:25px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

/* BUTTON SIZE */

.btn-form{
min-width:140px;
text-align:center;
}

/* MOBILE */

@media (max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

.form-group textarea{
grid-column:span 1;
}

.form-actions{
flex-direction:column;
}

.btn-form{
width:100%;
}

}

</style>

{% endblock %}
